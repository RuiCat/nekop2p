syntax = "proto3";

package nekop2p.brightchain;

option go_package = "github.com/nekop2p/nekop2p/x/brightchain/types";

import "gogoproto/gogo.proto";
import "cosmos/base/v1beta1/coin.proto";

// ============================================================
// BrightChain 自定义账户类型 (UserBlock)
// 每个用户拥有一个链上数据块，只能被自己更新
// ============================================================

message BrightAccount {
    // === 继承 Cosmos BaseAccount ===
    string   address        = 1;  // chain_id 的 bech32 编码
    uint64   account_number = 2;
    uint64   sequence       = 3;  // 交易序号 (防重放)

    // === 双密钥 (密码学根) ===
    bytes    recv_pk = 4;  // 32B: Curve25519 公钥 (别人加密给我)
    bytes    send_pk = 5;  // 32B: Ed25519 公钥 (验证我的签名)

    // === 信誉系统 ===
    uint64   credit_score       = 6;
    uint64   trust_weight       = 7;
    uint64   total_repay_amount = 8;
    uint64   credit_limit       = 9;

    // === 种子期标记 ===
    bool     seed_phase  = 10;
    repeated bytes guarantors = 11;  // 担保人 chain_id 列表

    // === 节点角色 ===
    NodeRole node_role       = 12;
    int64    node_term_start = 13;
    int64    node_term_end   = 14;

    // === 好友列表 (链上存储，用户签名更新) ===
    repeated FriendRecord friends = 15;

    // === 担保关系 ===
    repeated BondRef guaranteed_of = 16;  // 我担保了谁
    repeated BondRef guaranteed_by = 17;  // 谁担保了我
}

enum NodeRole {
    NODE_ROLE_UNSPECIFIED = 0;
    NODE_ROLE_NONE        = 1;  // 普通用户
    NODE_ROLE_FORMAL      = 2;  // 正式节点
    NODE_ROLE_CANDIDATE   = 3;  // 候选人
    NODE_ROLE_BLACKLISTED = 4;  // 黑名单
}

message FriendRecord {
    bytes    chain_id      = 1;
    bytes    recv_pk       = 2;  // 好友的接收公钥
    bytes    send_pk       = 3;  // 好友的发送公钥
    uint32   trust_dist    = 4;  // 1=直接好友 2=好友介绍
    int64    added_at      = 5;
    bytes    introduced_by = 6;  // 介绍人 chain_id (trust_dist=2时)
}

message BondRef {
    string   bond_id     = 1;
    bytes    other_party = 2;  // 对方 chain_id
}

// ============================================================
// 担保债券
// ============================================================

message GuaranteeBond {
    string   bond_id          = 1;
    bytes    inviter          = 2;  // 担保人
    bytes    invitee          = 3;  // 被担保人
    uint64   amount           = 4;  // 质押金额
    repeated bytes bond_notes = 5;  // 质押的信用票据ID列表
    double   coefficient      = 6;  // 额度转换系数 ≤ 1.0
    int64    lock_period_days = 7;  // 锁定天数
    BondStatus status         = 8;
    int64    created_at       = 9;
}

enum BondStatus {
    BOND_STATUS_UNSPECIFIED = 0;
    BOND_STATUS_ACTIVE      = 1;
    BOND_STATUS_RELEASED    = 2;
    BOND_STATUS_FORFEITED   = 3;
}

// ============================================================
// 交易消息
// ============================================================

message MsgRegister {
    string   sender          = 1;
    bytes    recv_pk         = 2;  // 接收公钥
    bytes    send_pk         = 3;  // 发送公钥
    bytes    zk_proof        = 4;  // ZK身份证明 (≥3担保人)
    repeated bytes guarantor_sigs = 5;  // 担保人链下签名
    repeated bytes invite_creds   = 6;  // 邀请凭证 (线下邀请)
}

message MsgRepay {
    string                sender          = 1;
    repeated cosmos.base.v1beta1.Coin amount = 2;  // 还款碎片金额
    bytes                 zk_repay_proof  = 3;  // ZK还款证明
    bytes                 inkwell_ref     = 4;  // 混沌结算参考号
}

message MsgUpdateFriends {
    string   sender           = 1;
    repeated FriendRecord add = 2;  // 新增好友
    repeated bytes      remove = 3;  // 移除好友
}

message MsgGuarantee {
    string   sender           = 1;  // 担保人
    string   invitee          = 2;  // 被担保人
    repeated bytes bond_notes = 3;  // 质押票据
    double   coefficient      = 4;
    int64    lock_period_days = 5;
    bytes    zk_legitimate    = 6;  // ZK证明: 合法担保人
}

message MsgReleaseBond {
    string   sender  = 1;
    string   bond_id = 2;
}

message MsgForfeitBond {
    string   sender  = 1;
    string   bond_id = 2;
}

// ============================================================
// 查询
// ============================================================

message QueryUserRequest {
    bytes chain_id = 1;
}

message QueryUserResponse {
    BrightAccount account = 1;
}

message QueryPoolRequest {}

message QueryPoolResponse {
    uint64 balance = 1;
}

message QueryBondsRequest {
    bytes chain_id = 1;
}

message QueryBondsResponse {
    repeated GuaranteeBond as_inviter = 1;  // 作为担保人的债券
    repeated GuaranteeBond as_invitee = 2;  // 作为被担保人的债券
}
