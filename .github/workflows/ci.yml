name: nekop2p CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Build
      working-directory: nekop2p
      run: go build ./...

    - name: Vet
      working-directory: nekop2p
      run: go vet ./...

    - name: Test
      working-directory: nekop2p
      run: go test -timeout 120s -count=1 ./...

    - name: Race Detection
      working-directory: nekop2p
      run: go test -race -timeout 180s -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        working-directory: nekop2p
        args: --timeout=5m
